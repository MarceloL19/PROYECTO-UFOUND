<!DOCTYPE html>

<head>

    <title>Inicio Oficina | U-Found</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="dashboard-page">

        <article><span>Entregados</span><strong>0</strong><small>EPIC posterior</small></article>

</html>
