<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle objeto encontrado | U-Found</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="dashboard-page">
<div th:replace="~{fragments/layout :: topbar(${usuario})}"></div>
<div th:replace="~{fragments/layout :: sidebar('encontrados', ${usuario})}"></div>
<main class="dashboard-shell">
    <a class="back-link" th:href="@{/objetos-encontrados}">Volver a objetos</a>

    <section class="found-detail">
        <div class="found-media">
            <div class="found-main-image">
                <img th:if="${objeto.imagenUrl != null}" th:src="@{${objeto.imagenUrl}}" th:alt="${objeto.nombre}">
                <span th:if="${objeto.imagenUrl == null}">Sin foto adjunta</span>
            </div>
        </div>

        <div class="found-info">
            <div class="detail-tags">
                <span th:text="${objeto.categoria.etiqueta}">Categoria</span>
                <span class="status-found" th:text="${objeto.estado.etiqueta}">Reportado</span>
            </div>
            <h1 th:text="${objeto.nombre}">Objeto encontrado</h1>
            <p class="object-code" th:text="${'UF-EN-' + #numbers.formatInteger(objeto.idObjeto, 3)}">UF-EN-001</p>

            <div class="detail-metrics">
                <article>
                    <small>Ubicacion</small>
                    <strong th:text="${objeto.ubicacion.etiqueta}">Biblioteca</strong>
                </article>
                <article>
                    <small>Fecha</small>
                    <strong th:text="${#temporals.format(objeto.fechaHora, 'dd MMM yyyy')}">10 Jun 2025</strong>
                </article>
                <article>
                    <small>Reportado por</small>
                    <strong th:text="${objeto.usuario.nombre}">Seguridad</strong>
                </article>
                <article>
                    <small>Hora</small>
                    <strong th:text="${#temporals.format(objeto.fechaHora, 'HH:mm')}">12:30</strong>
                </article>
            </div>

            <h2>Descripcion</h2>
            <p class="detail-description" th:text="${objeto.descripcion}">Descripcion del objeto.</p>

            <div class="detail-actions">
                <a class="primary-link" th:href="@{/objetos-encontrados}">Volver al listado</a>
                <a class="secondary-button" th:href="@{/estados/{tipo}/{id}(tipo='ENCONTRADO', id=${objeto.idObjeto})}">Ver estado</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
