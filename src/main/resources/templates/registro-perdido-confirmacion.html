<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro confirmado | U-Found</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="dashboard-page">
<div th:replace="~{fragments/layout :: topbar(${usuario})}"></div>
<div th:replace="~{fragments/layout :: sidebar('reportar', ${usuario})}"></div>
<main class="dashboard-shell">
    <section class="confirmation-card">
        <span>OK</span>
        <h1>Objeto perdido registrado</h1>
        <p>Tu reporte fue guardado correctamente con el codigo:</p>
        <strong th:text="${'UF-PER-' + idObjeto}">UF-PER-1</strong>
        <div class="confirmation-actions">
            <a class="secondary-button" th:href="@{/objetos-perdidos/registrar}">Registrar otro</a>
            <a class="primary-link" th:href="@{/objetos-perdidos/mis-reportes}">Ver mis reportes</a>
        </div>
    </section>
</main>
</body>
</html>
