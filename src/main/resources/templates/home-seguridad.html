<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Seguridad | U-Found</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="dashboard-page">
<div th:replace="~{fragments/layout :: topbar(${usuario})}"></div>
<div th:replace="~{fragments/layout :: sidebar('dashboard', ${usuario})}"></div>
<main class="dashboard-shell">
    <section class="dashboard-hero">
        <div>
            <p>Bienvenido de vuelta,</p>
            <h1 th:text="${usuario.nombre}">Seguridad</h1>
            <span>Seguridad</span>
        </div>
        <div class="hero-id"><small>CODIGO</small><strong>SEG-045</strong></div>
    </section>
    <section class="stats-grid">
        <article><span>Registrados</span><strong th:text="${totalHallazgos}">0</strong><small>Por tu usuario</small></article>
        <article><span>En revision</span><strong>0</strong><small>EPIC posterior</small></article>
        <article><span>Entregados hoy</span><strong>0</strong><small>EPIC posterior</small></article>
    </section>
    <section class="actions-grid dashboard-actions">
        <a class="home-card" th:href="@{/objetos-encontrados/registrar}">
            <span>+</span>
            <h2>Registrar hallazgo</h2>
            <p>Registra objetos encontrados dentro del campus.</p>
        </a>
        <a class="home-card" th:href="@{/objetos-encontrados}">
            <span>#</span>
            <h2>Objetos encontrados</h2>
            <p>Visualiza los hallazgos registrados en el sistema.</p>
        </a>
    </section>
</main>
</body>
</html>
