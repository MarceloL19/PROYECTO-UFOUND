<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | U-Found</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="login-page login-page-modern">
<main class="login-modern-shell">
    <section class="login-hero-panel">
        <img class="login-logo" th:src="@{/img/logo-ufound.png}" alt="U-Found">
        <div>
            <p class="eyebrow">UNIVERSIDAD DE LIMA</p>
            <h1>Gestion de objetos perdidos</h1>
            <p>Accede al sistema para registrar, consultar y gestionar reportes dentro del campus.</p>
        </div>
    </section>

    <section class="login-card login-modern-card">
        <form class="login-form" th:action="@{/login}" method="post">
            <h2>Iniciar sesion</h2>
            <p class="form-subtitle">Ingresa con tu correo institucional.</p>

            <div class="alert" th:if="${error}" th:text="${error}">Error</div>

            <label for="correo">Correo electronico</label>
            <input id="correo" name="correo" type="email" th:value="${correo}" placeholder="20235694@aloe.ulima.edu.pe" required autofocus>

            <label for="password">Contrasena</label>
            <input id="password" name="password" type="password" placeholder="Ingresa tu contrasena" required>

            <button type="submit">Ingresar</button>
        </form>
    </section>
</main>
</body>
</html>
